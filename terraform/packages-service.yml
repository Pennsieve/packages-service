#file: noinspection MaybeTerraformTemplateInspection
openapi: 3.0.1
info:
  version: "3.0"
  title: Package Service
  description: |
    The Package Service handles package related requests
  termsOfService: https://docs.pennsieve.io/page/pennsieve-terms-of-use
  contact:
    name: Pennsieve Support
    email: support@pennsieve.net
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api2.pennsieve.io/packages
    description: Production server
  - url: https://api2.pennsieve.net/packages
    description: Development server
externalDocs:
  description: Find more info here
  url: https://docs.pennsieve.io
tags:
  - name: Packages Service
    description: Management of dataset packages
    externalDocs:
      url: https://docs.pennsieve.io/reference

paths:
  /restore:
    post:
      summary: Restore deleted items
      description: |
        Starts restore process for the given deleted items
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: restoreItems
      security:
        - token_dataset_auth: [ ]
      tags:
        - Packages
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        description: node ids of the items to restore
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/restoreRequest'
      responses:
        '200':
          description: The result of starting the restore process.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/restoreResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /download-manifest:
    post:
      summary: Get download manifest with presigned S3 URLs
      description: |
        Returns file metadata and presigned S3 URLs for the requested packages.
        Resolves package hierarchies (including collections) into individual files
        with their S3 download URLs.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: downloadManifest
      security:
        - token_dataset_auth: [ ]
      tags:
        - Packages
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        description: package node IDs to resolve
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/downloadRequest'
      responses:
        '200':
          description: Download manifest with presigned URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/downloadManifestResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /formats:
    get:
      summary: List supported file formats
      description: |
        Returns the Pennsieve file-format registry: a static catalog of supported
        formats with their media types, file-type tags, and extensions.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: listFormats
      security:
        - token_auth: [ ]
      tags:
        - Packages
      responses:
        '200':
          description: The file-format registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/formatsResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /discover/assets:
    get:
      summary: List viewer assets for a published package
      description: |
        Unauthenticated endpoint that returns viewer assets linked to a published
        package along with a CloudFront signed policy for accessing the asset files.
        Validates that the package is published via the Discover database.
        Each asset includes an `asset_url`. To access files, append the relative
        path and signing params:
        `{asset_url}{path}?Policy={policy}&Signature={signature}&Key-Pair-Id={key_pair_id}`
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: discoverListViewerAssets
      tags:
        - Discover
      parameters:
        - in: query
          name: package_id
          schema:
            type: string
          required: true
          description: source package node id (e.g. `N:package:uuid`)
      responses:
        '200':
          description: List of viewer assets with CloudFront access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listViewerAssetsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'

  /assets:
    post:
      summary: Create a viewer asset and get upload credentials
      description: |
        Creates a viewer asset record and returns temporary AWS credentials
        scoped to the asset's S3 prefix for direct upload to the storage bucket.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: createViewerAsset
      security:
        - token_dataset_auth: [ ]
      tags:
        - Viewer Assets
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createViewerAssetRequest'
      responses:
        '201':
          description: Asset created with upload credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createViewerAssetResponse'
        '409':
          description: Conflict
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      summary: List viewer assets for a package
      description: |
        Returns viewer assets linked to a package along with a CloudFront
        signed policy for accessing the assets. Each asset includes an `asset_url`.
        To access files, append the relative path and signing params:
        `{asset_url}{path}?Policy={policy}&Signature={signature}&Key-Pair-Id={key_pair_id}`
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: listViewerAssets
      security:
        - token_dataset_auth: [ ]
      tags:
        - Viewer Assets
      parameters:
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
        - in: query
          name: package_id
          schema:
            type: string
          required: true
          description: package node id
      responses:
        '200':
          description: List of viewer assets with CloudFront access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listViewerAssetsResponse'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

  /assets/{asset_id}:
    patch:
      summary: Update a viewer asset
      description: |
        Updates status, properties, or package links for an existing viewer asset.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: updateViewerAsset
      security:
        - token_dataset_auth: [ ]
      tags:
        - Viewer Assets
      parameters:
        - in: path
          name: asset_id
          schema:
            type: string
            format: uuid
          required: true
          description: viewer asset UUID
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateViewerAssetRequest'
      responses:
        '200':
          description: Updated viewer asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/viewerAsset'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete a viewer asset and its S3 objects
      description: |
        Deletes the viewer asset record and all associated S3 objects
        under the asset's prefix.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/packages-service'
      operationId: deleteViewerAsset
      security:
        - token_dataset_auth: [ ]
      tags:
        - Viewer Assets
      parameters:
        - in: path
          name: asset_id
          schema:
            type: string
            format: uuid
          required: true
          description: viewer asset UUID
        - in: query
          name: dataset_id
          schema:
            type: string
          required: true
          description: dataset node id
      responses:
        '204':
          description: Asset deleted
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'

components:
  x-amazon-apigateway-integrations:
    packages-service:
      type: aws_proxy
      uri: ${packages_service_lambda_arn}
      httpMethod: POST
      passthroughBehavior: when_no_match
      contentHandling: CONVERT_TO_TEXT
      payloadFormatVersion: 2.0
  securitySchemes:
    token_dataset_auth:
      type: "apiKey"
      name: "Unused"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.dataset_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
    token_auth:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}

  responses:
    Unauthorized:
      description: Incorrect authentication or user has incorrect permissions.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
    Error:
      description: Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorId:
                type: string
  schemas:
    restoreRequest:
      type: object
      properties:
        nodeIds:
          type: array
          items:
            type: string
          description: the node ids of the items to restore
    restoreResponse:
      type: object
      properties:
        success:
          type: array
          items:
            type: string
          description: the node ids for which restore has started
        failures:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              error:
                type: string
          description: any restore failures grouped by node id

    cloudfrontURLComponents:
      type: object
      description: Optional URL components for client-side URL construction (only present when include_components=true)
      properties:
        base_url:
          type: string
          description: Base URL prefix for constructing additional URLs within the same package
          example: "https://d1xck3bfkf5p24.cloudfront.net/O19/D2049/P2243538/"
        policy:
          type: string
          description: Base64-encoded CloudFront policy
          example: "eyJTdGF0ZW1lbnQiOlt7IlJlc291cmNlIjoi..."
        signature:
          type: string
          description: CloudFront URL signature
          example: "gkvuqiOWzMao2WC3BPCZqv0Iw4PiFcvdIer..."
        key_pair_id:
          type: string
          description: CloudFront key pair ID used for signing
          example: "K13520HK8DZ474"
        policy_info:
          $ref: '#/components/schemas/cloudfrontPolicyInfo'

    cloudfrontPolicyInfo:
      type: object
      description: Decoded policy information for debugging and monitoring
      properties:
        resource_pattern:
          type: string
          description: The resource pattern allowed by this policy
          example: "https://d1xck3bfkf5p24.cloudfront.net/O19/D2049/P2243538/*"
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the policy expires
          example: 1766457092
        expires_at_iso:
          type: string
          format: date-time
          description: ISO 8601 formatted expiration time
          example: "2025-12-23T01:11:32Z"

    createViewerAssetRequest:
      type: object
      required:
        - name
        - asset_type
      properties:
        name:
          type: string
          description: Display name for the asset
        asset_type:
          type: string
          description: Type of viewer asset (e.g. ome-zarr, neuroglancer-precomputed)
        properties:
          type: object
          additionalProperties: true
          description: Arbitrary metadata
        package_ids:
          type: array
          items:
            type: string
          description: Package node IDs to attach the asset to

    createViewerAssetResponse:
      type: object
      properties:
        asset:
          $ref: '#/components/schemas/viewerAsset'
        upload_credentials:
          $ref: '#/components/schemas/uploadCredentials'

    viewerAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dataset_id:
          type: string
        name:
          type: string
        asset_type:
          type: string
        asset_url:
          type: string
          description: |
            CloudFront base URL for the asset's files. To access a file, append the
            relative file path and the CloudFront signing query params from the
            `cloudfront` object in the response. Example full URL:
            `{asset_url}.zattrs?Policy={policy}&Signature={signature}&Key-Pair-Id={key_pair_id}`
          example: "https://assets.pennsieve.net/abc123ef/O19/D2049/a1b2c3d4-e5f6-7890-abcd-ef1234567890/"
        properties:
          type: object
          additionalProperties: true
        status:
          type: string
        package_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    updateViewerAssetRequest:
      type: object
      properties:
        status:
          type: string
          enum: [created, ready]
        properties:
          type: object
          additionalProperties: true
        package_ids:
          type: array
          items:
            type: string

    uploadCredentials:
      type: object
      properties:
        access_key_id:
          type: string
        secret_access_key:
          type: string
        session_token:
          type: string
        expiration:
          type: string
          format: date-time
        bucket:
          type: string
        region:
          type: string
        key_prefix:
          type: string

    listViewerAssetsResponse:
      type: object
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/viewerAsset'
        cloudfront:
          $ref: '#/components/schemas/cloudfrontURLComponents'

    downloadRequest:
      type: object
      required:
        - nodeIds
      properties:
        nodeIds:
          type: array
          items:
            type: string
          description: Package node IDs to resolve into downloadable files

    downloadManifestResponse:
      type: object
      properties:
        header:
          type: object
          properties:
            count:
              type: integer
              description: Number of files in the manifest
            size:
              type: integer
              format: int64
              description: Total size in bytes
        data:
          type: array
          items:
            type: object
            properties:
              nodeId:
                type: string
              fileName:
                type: string
              packageName:
                type: string
              path:
                type: array
                items:
                  type: string
                description: Hierarchical folder path
              url:
                type: string
                description: Presigned S3 download URL (valid for 180 minutes)
              size:
                type: integer
                format: int64
              fileExtension:
                type: string

    format:
      type: object
      required:
        - id
        - name
        - mediaTypes
      properties:
        id:
          type: string
          description: Stable identifier for the format
          example: "pdf"
        name:
          type: string
          description: Human-readable name
          example: "PDF"
        description:
          type: string
          description: Short description of the format
          example: "Portable Document Format."
        mediaTypes:
          type: array
          items:
            type: string
          description: IANA media types associated with this format
          example: ["application/pdf"]
        fileTypes:
          type: array
          items:
            type: string
          description: Pennsieve file-type tags
          example: ["PDF"]
        extensions:
          type: array
          items:
            type: string
          description: File extensions (including the leading dot)
          example: [".pdf"]
        edam:
          type: string
          description: EDAM ontology identifier, when applicable

    formatsResponse:
      type: object
      required:
        - schemaVersion
        - formats
      properties:
        schemaVersion:
          type: string
          description: Semantic version of the registry payload
          example: "1.0.0"
        formats:
          type: array
          items:
            $ref: '#/components/schemas/format'
